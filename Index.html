<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock scissors papper game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock    Papper     Scissors</h1>
    <div class="choises">
        <div class="choise" id="rock">
            <img src="Image/rock.png">
        </div>
        <div class="choise" id="paper">
             <img src="Image/paper.png">
        </div>
        <div class="choise" id="scissors">
             <img src="Image/scissors.png">
        </div>
    </div>

    <div class="score-board">
        <div class="score">
            <p id="user-score">0</p>
            <p>You</p>
        </div>
        <div class="score">
            <p id="comp-score">0</p>
            <p>Computer</p>
        </div>        
    </div>

    <div class="msg-container">
        <p id="msg">Play Your Move </p>
    </div>
    <script src="script.js"></script>
</body>
</html>
